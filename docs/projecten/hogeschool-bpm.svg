<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Abstracte placeholder voor business process management</title>
  <desc id="desc">Een abstracte visual met proceslijnen, kaarten en schaalvoordeel accenten.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#190f2d"/>
      <stop offset=".55" stop-color="#3c2063"/>
      <stop offset="1" stop-color="#d8fe56"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="820" fill="url(#bg)"/>
  <circle cx="1010" cy="120" r="190" fill="#d8fe56" opacity=".16"/>
  <circle cx="180" cy="680" r="250" fill="#c850d8" opacity=".22"/>
  <g fill="none" stroke="#fff" stroke-width="2" opacity=".18">
    <path d="M120 170h260c80 0 80 110 160 110h160c90 0 90 120 180 120h210"/>
    <path d="M120 320h190c80 0 80 120 160 120h300c90 0 90 110 180 110h120"/>
    <path d="M120 500h280c70 0 70-90 140-90h250c80 0 80-90 160-90h120"/>
  </g>
  <g filter="url(#glow)">
    <rect x="120" y="135" width="235" height="105" rx="28" fill="#ffffff" opacity=".92"/>
    <rect x="460" y="230" width="235" height="105" rx="28" fill="#ffffff" opacity=".82"/>
    <rect x="805" y="360" width="235" height="105" rx="28" fill="#ffffff" opacity=".9"/>
    <rect x="175" y="470" width="270" height="125" rx="32" fill="#ffffff" opacity=".72"/>
    <rect x="570" y="515" width="300" height="125" rx="32" fill="#ffffff" opacity=".8"/>
  </g>
  <g fill="#170f26">
    <rect x="155" y="168" width="150" height="12" rx="6" opacity=".65"/>
    <rect x="155" y="196" width="95" height="12" rx="6" opacity=".35"/>
    <rect x="495" y="263" width="150" height="12" rx="6" opacity=".65"/>
    <rect x="495" y="291" width="100" height="12" rx="6" opacity=".35"/>
    <rect x="840" y="393" width="150" height="12" rx="6" opacity=".65"/>
    <rect x="840" y="421" width="95" height="12" rx="6" opacity=".35"/>
    <rect x="215" y="510" width="170" height="12" rx="6" opacity=".65"/>
    <rect x="215" y="540" width="115" height="12" rx="6" opacity=".35"/>
    <rect x="610" y="555" width="195" height="12" rx="6" opacity=".65"/>
    <rect x="610" y="585" width="130" height="12" rx="6" opacity=".35"/>
  </g>
  <text x="80" y="745" fill="#fff" font-family="Arial, sans-serif" font-size="34" font-weight="700" letter-spacing="6" opacity=".78">PROCESSEN IN BEELD</text>
</svg>
