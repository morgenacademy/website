<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Abstracte placeholder voor AI-planning in transport</title>
  <desc id="desc">Een abstracte visual met routes, planning en transportbeweging.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#101624"/>
      <stop offset=".55" stop-color="#1d4c5a"/>
      <stop offset="1" stop-color="#d8fe56"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>
  <rect width="1200" height="820" fill="url(#bg)"/>
  <circle cx="960" cy="165" r="210" fill="#d8fe56" opacity=".16" filter="url(#soft)"/>
  <circle cx="250" cy="660" r="260" fill="#5b2d8e" opacity=".32" filter="url(#soft)"/>
  <g fill="none" stroke="#fff" stroke-linecap="round">
